<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Multi Ferramentas</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
      border: none;
      background: #555;
      color: white;
    }

    nav button:hover {
      background: #777;
    }

    section {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    /* To-Do */
    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 5px 0;
      padding: 10px;
      cursor: pointer;
    }

    /* Jogo da Velha */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: white;
      font-size: 2em;
      text-align: center;
      line-height: 100px;
      cursor: pointer;
    }

    /* Calculadora */
    .calc button {
      width: 50px;
      height: 50px;
      margin: 5px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    .calculator {
    width: 250px;
    margin: auto;
    background: black;
    padding: 15px;
    border-radius: 20px;
    }

    #display {
    width: 100%;
    height: 60px;
    font-size: 28px;
    text-align: right;
    margin-bottom: 10px;
    border: none;
    background: black;
    color: white;
    }

    .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    }

    button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 50%;
    background: #333;
    color: white;
    cursor: pointer;
    }

    button:hover {
    opacity: 0.8;
    }

    .orange {
    background: orange;
    color: white;
    }

    .gray {
    background: #a5a5a5;
    color: black;
    }

    .zero {
    grid-column: span 2;
    border-radius: 25px;
    }

    #board {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 5px;
    justify-content: center;
    margin: 15px 0;
    }

    .cell {
    width: 80px;
    height: 80px;
    background: #222;
    color: white;
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    }

    .cell:hover {
    background: #444;
    }
</style>
</head>
<body>

<header>
  <h1>Projeto Multi Ferramentas</h1>
  <nav>
    <button onclick="show('todo')">To-Do List</button>
    <button onclick="show('contador')">Contador</button>
    <button onclick="show('jogo')">Jogo da Velha</button>
    <button onclick="show('calc')">Calculadora</button>
    <button onclick="show('cep')">Buscador de CEP</button>
  </nav>
</header>

<section id="todo" class="active">
  <h2>To-Do List</h2>
  <input type="text" id="task" placeholder="Digite uma tarefa">
  <button onclick="addTask()">Adicionar</button>
  <button onclick="clearTasks()">Limpar</button>
  <ul id="list"></ul>
</section>

<section id="contador" class="">
  <h2>Contador de Cliques</h2>
  <p id="count">0</p>
  <button onclick="increment()">+</button>
  <button onclick="decrease()">-</button>
  <p id="count2">0</p>
</section>

<section id="jogo" class="">
  <h2>Jogo da Velha</h2>

  <div id="board"></div>

  <p id="status">Vez do jogador: X</p>

  <button onclick="resetGame()">Reiniciar</button>
</section>

<section id="calc" class="">
  <h2>Calculadora</h2>

  <div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
      <button onclick="clearCalc()" class="gray">AC</button>
      <button onclick="add('%')" class="gray">%</button>
      <button onclick="" class=""></button>
      <button onclick="add('/')" class="orange">÷</button>

      <button onclick="add('9')">9</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('7')">7</button>
      <button onclick="add('*')" class="orange">×</button>

      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button onclick="add('-')" class="orange">−</button>

      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button onclick="add('+')" class="orange">+</button>

      <button onclick="add('0')" class="zero">0</button>
      <button onclick="add('.')">.</button>
      <button onclick="calc()" class="orange">=</button>
    </div>
  </div>
</section>

<section id="cep" class="">
  <h2>Buscador de CEP</h2>
  <input id="cepInput" placeholder="Digite o CEP">
  <button onclick="buscarCEP()">Buscar</button>
  <p id="cepResult"></p>
</section>

<script>
  // Navegação
  function show(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // To-Do
  function addTask() {
  let taskInput = document.getElementById("task");
  let task = taskInput.value.trim();

  if (task === "") return;

  let li = document.createElement("li");
  li.textContent = task;

  // Create remove button
  let btn = document.createElement("button");
  btn.textContent = "❌";
  btn.style.marginLeft = "10px";

  btn.onclick = function () {
    li.remove();
  };

  li.appendChild(btn);

  document.getElementById("list").appendChild(li);

  taskInput.value = "";
  }

  function clearTasks() {
  document.getElementById("list").innerHTML = "";
  }

  // Contador
  let count = 0;
  let count2 = 0;
  function increment() {
    count++;
    count2++;
    document.getElementById("count").textContent = count;
    document.getElementById("count").textContent = count2;
  }
  function decrease() {
  count--;
  count2++;
  document.getElementById("count").textContent = count;
  document.getElementById("count").textContent = count2;
  }

  // Jogo da Velha
    let board = Array(9).fill("");
    let player = "X";
    let gameOver = false;

    const boardDiv = document.getElementById("board");
    const statusText = document.getElementById("status");

    // Create board
    function createBoard() {
    boardDiv.innerHTML = "";
    board.forEach((_, i) => {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.onclick = () => play(i, cell);
        boardDiv.appendChild(cell);
    });
    }

    // Play move
    function play(i, cell) {
    if (board[i] !== "" || gameOver) return;

    board[i] = player;
    cell.textContent = player;

    if (checkWinner()) {
        statusText.textContent = `Jogador ${player} venceu!`;
        gameOver = true;
        return;
    }

    if (!board.includes("")) {
        statusText.textContent = "Empate!";
        gameOver = true;
        return;
    }

    player = player === "X" ? "O" : "X";
    statusText.textContent = `Vez do jogador: ${player}`;
    }

    // Check winner
    function checkWinner() {
    const wins = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
    ];

    return wins.some(combo => {
        const [a, b, c] = combo;
        return board[a] && board[a] === board[b] && board[a] === board[c];
    });
    }

    // Reset game
    function resetGame() {
    board = Array(9).fill("");
    player = "X";
    gameOver = false;
    statusText.textContent = "Vez do jogador: X";
    createBoard();
    }

    // Initialize
    createBoard();

  // Calculadora
  function add(value) {
  document.getElementById("display").value += value;
 }

function clearCalc() {
  document.getElementById("display").value = "";
 }

function calc() {
  let exp = document.getElementById("display").value;

  try {
    document.getElementById("display").value = eval(exp);
  } catch {
    document.getElementById("display").value = "Erro";
  }
 }

  // CEP
  async function buscarCEP() {
    let cep = document.getElementById("cepInput").value;
    let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    let data = await res.json();

    document.getElementById("cepResult").textContent =
      data.logradouro + ", " + data.bairro + " - " + data.localidade;
  }
</script>
</body>
</html>
