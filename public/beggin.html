<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Multi Ferramentas</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
      border: none;
      background: #555;
      color: white;
    }

    nav button:hover {
      background: #777;
    }

    section {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    /* To-Do */
    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: white;
      margin: 5px 0;
      padding: 10px;
      cursor: pointer;
    }

    /* Jogo da Velha */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: white;
      font-size: 2em;
      text-align: center;
      line-height: 100px;
      cursor: pointer;
    }

    /* Calculadora */
    .calc button {
      width: 50px;
      height: 50px;
      margin: 5px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

  </style>
</head>
<body>

<header>
  <h1>Projeto Multi Ferramentas</h1>
  <nav>
    <button onclick="showSection('todo')">To-Do List</button>
    <button onclick="showSection('contador')">Contador</button>
    <button onclick="showSection('jogo')">Jogo da Velha</button>
    <button onclick="showSection('calc')">Calculadora</button>
    <button onclick="showSection('cep')">Buscador de CEP</button>
  </nav>
</header>

<section id="todo" class="active">
  <h2>To-Do List</h2>
  <input type="text" id="task" placeholder="Digite uma tarefa">
  <button onclick="addTask()">Adicionar</button>
  <button onclick="clearTasks()">Limpar</button>
  <ul id="list"></ul>
</section>

<section id="contador" class="active">
  <h2>Contador de Cliques</h2>
  <p id="count">0</p>
  <button onclick="increment()">+</button>
  <button onclick="decrease()">-</button>
</section>

<section id="jogo" class="active">
  <h2>Jogo da Velha</h2>
  <p>Em breve...</p>
</section>

<section id="calc" class="active">
  <h2>Calculadora</h2>
  <input id="num1" type="number" placeholder="Número 1">
  <input id="num2" type="number" placeholder="Número 2">
  <button onclick="calc('+')">+</button>
  <button onclick="calc('-')">-</button>
  <button onclick="calc('*')">*</button>
  <button onclick="calc('/')">/</button>
  <p id="result"></p>
</section>

<section id="cep" class="active">
  <h2>Buscador de CEP</h2>
  <input id="cepInput" placeholder="Digite o CEP">
  <button onclick="buscarCEP()">Buscar</button>
  <p id="cepResult"></p>
</section>

<script>
  // Navegação
  function show(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // To-Do
  function addTask() {
  let taskInput = document.getElementById("task");
  let task = taskInput.value.trim();

  if (task === "") return;

  let li = document.createElement("li");
  li.textContent = task;

  // Create remove button
  let btn = document.createElement("button");
  btn.textContent = "❌";
  btn.style.marginLeft = "10px";

  btn.onclick = function () {
    li.remove();
  };

  li.appendChild(btn);

  document.getElementById("list").appendChild(li);

  taskInput.value = "";
  }

  function clearTasks() {
  document.getElementById("list").innerHTML = "";
  }

  // Contador
  let count = 0;
  function increment() {
    count++;
    document.getElementById("count").textContent = count;
  }
  function decrease() {
  count--;
  document.getElementById("count").textContent = count;
  }

  // Jogo da Velha
  let board = Array(9).fill("");
  let player = "X";

  const boardDiv = document.getElementById("board");
  board.forEach((_, i) => {
    let cell = document.createElement("div");
    cell.className = "cell";
    cell.onclick = () => play(i, cell);
    boardDiv.appendChild(cell);
  });

  function play(i, cell) {
    if (board[i] === "") {
      board[i] = player;
      cell.textContent = player;
      player = player === "X" ? "O" : "X";
    }
  }

  // Calculadora
  function add(value) {
    document.getElementById("display").value += value;
  }

  function clearCalc() {
    document.getElementById("display").value = "";
  }

  function calc() {
    let exp = document.getElementById("display").value;
    document.getElementById("display").value = eval(exp);
  }

  // CEP
  async function buscarCEP() {
    let cep = document.getElementById("cepInput").value;
    let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    let data = await res.json();

    document.getElementById("cepResult").textContent =
      data.logradouro + ", " + data.bairro + " - " + data.localidade;
  }
</script>
</body>
</html>
